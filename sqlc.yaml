version: "2"
sql:
  - schema: "internal/storage/migrations"
    queries: "internal/storage/queries"
    engine: "sqlite"
    gen:
      go:
        package: "sqlc"
        out: "internal/storage/sqlc"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
